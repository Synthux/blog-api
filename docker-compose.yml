version: '3.9'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: blog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloguser"]
      interval: 5s
      timeout: 3s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    env_file:
      - settings/.env
    volumes:
      - sqlite_data:/blog-api/data
      - static_volume:/blog-api/staticfiles
      - media_volume:/blog-api/media
      - ./settings/.env:/blog-api/settings/.env
      - ./logs:/blog-api/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: daphne -b 0.0.0.0 -p 8000 settings.asgi:application
    restart: unless-stopped
  
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - web
    restart: unless-stopped

  celery_worker:
    build: .
    env_file:
      - settings/.env
    volumes:
      - sqlite_data:/blog-api/data
      - static_volume:/blog-api/staticfiles
      - media_volume:/blog-api/media
      - ./settings/.env:/blog-api/settings/.env
      - ./logs:/blog-api/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A settings worker -l info

  celery_beat:
    build: .
    env_file:
      - settings/.env
    volumes:
      - sqlite_data:/blog-api/data
      - static_volume:/blog-api/staticfiles
      - media_volume:/blog-api/media
      - ./settings/.env:/blog-api/settings/.env
      - ./logs:/blog-api/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A settings beat -l info

  flower:
    build: .
    env_file:
      - settings/.env
    volumes:
      - sqlite_data:/blog-api/data
      - static_volume:/blog-api/staticfiles
      - media_volume:/blog-api/media
      - ./settings/.env:/blog-api/settings/.env
      - ./logs:/blog-api/logs
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: >
      celery -A settings flower
      --basic_auth=${BLOG_FLOWER_USER}:${BLOG_FLOWER_PASSWORD}

volumes:
  sqlite_data:
  static_volume:
  media_volume:
  postgres_data:
